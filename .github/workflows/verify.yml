name: Verify

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          libdbus-1-dev \
          libpipewire-0.3-dev \
          libasound2-dev \
          libgtk-3-dev \
          libx11-dev \
          pkg-config \
          build-essential \
          cmake \
          libssl-dev \
          libzstd-dev \
          libudev-dev
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
